<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display =swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos .css">
    <link rel="icon" href="imagenes/spock-hand-gesture.svg">
    <title>Piedra, Papel, Tijera, Lagarto, Spock</title>
</head>
<body>
    <header>
        <h2 class="titulo-juego"> Piedra · Papel · Tijera · Lagarto · Spock</h2>
        <p class="subtitulo-juego">El juego definitivo</p>
    </header>

    <main>

        <div class="paneles-arriba">
            <section class="panel-seleccion-jugada ">
                <h2>Elige tu jugada</h2>

                <!-- Elección -->
                <section class="contenedor-elecciones-juego">

                    <!-- Piedra -->
                    
                    <button class="boton-eleccion-jugada"> 
                        <div class="icono-jugada">🪨</div>
                        <span>Piedra</span> 
                    </button>
                    
        
                    <!-- Papel -->
                    <button class="boton-eleccion-jugada"> 
                        <div class="icono-jugada">📋</div>
                        <span>Papel</span> 
                    </button>

                    <!-- Tijera -->
                    <button class="boton-eleccion-jugada"> 
                        <div class="icono-jugada">✂️</div>
                        <span>Tijera</span> 
                    </button>
        
                    <!-- Lagarto -->
                    <button class="boton-eleccion-jugada"> 
                        <div class="icono-jugada">🦎</div>
                        <span>Lagarto</span> 
                    </button>
        
                    <!-- Spock -->
                    <button class="boton-eleccion-jugada"> 
                        <div class="icono-jugada">🖖</div>
                        <span>Spock</span> 
                    </button>
                    
                </section>
            </section>
    
            <!-- Batalla -->
            <section class="panel-batalla">

                <h2>Batalla</h2>
    
                <section class="contenedor-jugadores">

                    <!-- Jugador -->
                    <div class="jugador etiqueta-jugador">
                        <p>Tú</p>
                    </div>

                    
                    <div class="vs-circle">
                        <p>VS</p>
                    </div>
                    
                    <!-- CPU -->
                    <div class="jugador etiqueta-jugador">
                        <p>CPU</p>
                    </div>
                    
                </section>
    
            </section>
    
        </div>

        <!-- Estadisticas -->
        <div class="paneles-abajo estadisticas"></div>

    </main>
    <footer>
        <p>
            Proyecto evaluación RA 03 - Lenguajes de marcas y sistemas de gestión de información.
        </p>

        <p>
            Proyecto realizado por:<strong>Juan Caballero Castillo</strong> (Declaro que no he usado IA en el proyecto) 
        </p>
    </footer>

    <script src="js/javascript.js"></script>

</body>
</html>
